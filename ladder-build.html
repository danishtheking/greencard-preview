<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Build-the-ladder CTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#16271F; --ink-2:#4E6157; --ink-3:#7E948A;
  --mint:#47C189; --mint-deep:#1B7A50; --mint-ink:#0E4E33;
  --mint-100:#ECF9F2; --mint-200:#D8F1E4; --mint-300:#BCE7D2;
  --line:#E4EBE6; --line-soft:#EDF2EE; --well:#F3F7F4;
  --sans:"Inter",system-ui,-apple-system,sans-serif;
  --mono:"Space Grotesk","Inter",system-ui,sans-serif;
  --ease-out:cubic-bezier(.22,1,.36,1); --ease-soft:cubic-bezier(.4,0,.2,1);
  --gls-1:rgba(124,229,182,.76); --gls-2:rgba(60,185,127,.70); --gls-edge:rgba(255,255,255,.55); --gls-sheen:rgba(255,255,255,.72);
  --pole:linear-gradient(90deg,#22332B,#16271F 45%,#0e1a14);
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:var(--sans); color:var(--ink); background:#fff; letter-spacing:-.006em; -webkit-font-smoothing:antialiased; font-optical-sizing:auto; }
.wrap{ width:min(1180px, calc(100% - 48px)); margin:0 auto; padding:40px 0 70px; }
.tag{ font-family:var(--mono); font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--mint-deep); margin-bottom:14px; }

.stage{ position:relative; overflow:hidden; border-radius:28px; border:1px solid var(--mint-200);
  background:radial-gradient(130% 90% at 50% -10%, #E6F7EE 0%, #F2FBF7 40%, #FFFFFF 82%);
  box-shadow: inset 0 1px 0 #fff, 0 30px 70px -42px rgba(22,39,31,.28);
  display:grid; grid-template-columns:1fr 0.95fr; gap:30px; align-items:center; padding:46px 50px; }
.cta__title{ font-family:var(--sans); font-weight:480; letter-spacing:-.03em; line-height:1.05; font-size:clamp(28px,3.6vw,46px); }
.cta__title em{ font-style:italic; color:var(--mint-deep); }
.cta__sub{ margin-top:16px; max-width:430px; color:var(--ink-2); font-size:16px; line-height:1.55; }
.meter{ margin-top:22px; max-width:340px; }
.meter__row{ display:flex; justify-content:space-between; align-items:baseline; font-size:13px; color:var(--ink-3); font-family:var(--mono); letter-spacing:.02em; }
.meter__row b{ color:var(--mint-deep); font-size:15px; }
.meter__bar{ margin-top:8px; height:8px; border-radius:99px; background:#E7EFEA; overflow:hidden; }
.meter__fill{ height:100%; width:35%; border-radius:99px; background:linear-gradient(90deg,var(--mint),var(--mint-deep)); transition:width .6s var(--ease-out); }
.cta__actions{ display:flex; gap:12px; margin-top:26px; flex-wrap:wrap; }
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; font-weight:600; font-size:15px; border-radius:13px; padding:14px 22px; border:1px solid transparent; transition:transform .14s ease, box-shadow .25s ease, background .2s ease; }
.btn--primary{ color:var(--mint-ink); background:linear-gradient(180deg, var(--gls-1), var(--gls-2)); border:1px solid var(--gls-edge); backdrop-filter:blur(10px) saturate(1.5); -webkit-backdrop-filter:blur(10px) saturate(1.5); text-shadow:0 1px 0 rgba(255,255,255,.4); box-shadow:inset 0 1px 0 var(--gls-sheen), 0 12px 28px -12px rgba(38,150,100,.5); }
.btn--primary:hover{ transform:translateY(-1px); }
.btn--primary.celebrate{ animation:pulse 1.1s var(--ease-out) 2; }
@keyframes pulse{ 0%,100%{ box-shadow:inset 0 1px 0 var(--gls-sheen), 0 12px 28px -12px rgba(38,150,100,.5) } 50%{ box-shadow:inset 0 1px 0 var(--gls-sheen), 0 0 0 6px rgba(71,193,137,.22), 0 16px 34px -12px rgba(38,150,100,.6) } }
.btn--ghost{ color:var(--ink); background:rgba(255,255,255,.5); border:1px solid var(--line); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }

/* ════ THE LADDER ════ */
.build{ display:flex; flex-direction:column; align-items:center; gap:18px; }
.ladderframe{ position:relative; width:330px; height:446px; max-width:100%; }
/* rails (poles) + feet */
.rail{ position:absolute; top:2px; bottom:22px; width:14px; border-radius:8px; z-index:2; background:var(--pole);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.06), inset 2px 0 0 rgba(255,255,255,.14), 0 6px 14px -6px rgba(22,39,31,.45); }
.rail.l{ left:40px } .rail.r{ left:128px }
.rail::after{ content:""; position:absolute; bottom:-20px; left:-3px; width:20px; height:24px; background:var(--pole); border-radius:0 0 7px 7px; }
.rail.l::after{ transform:rotate(9deg); transform-origin:top center; }
.rail.r::after{ transform:rotate(-9deg); transform-origin:top center; }
/* rungs between the rails */
.rung{ position:absolute; left:47px; width:100px; height:12px; border-radius:7px; transform:translateY(50%); z-index:1; transition:all .4s var(--ease-out); }
.rung.dashed{ height:7px; background-image:repeating-linear-gradient(90deg, var(--mint-300) 0 8px, transparent 8px 15px); }
.rung.built, .rung.base{ background:linear-gradient(180deg,#43b884,#1c7a50); box-shadow:inset 0 1.5px 0 rgba(255,255,255,.3), 0 2px 5px -1px rgba(28,122,80,.4); }
.rung.is-target{ height:12px; background:var(--mint); box-shadow:0 0 0 5px rgba(71,193,137,.22); }
.rung.pop{ animation:pop .5s var(--ease-out); }
@keyframes pop{ 0%{ transform:translateY(50%) scaleY(.4) } 55%{ transform:translateY(50%) scaleY(1.25) } 100%{ transform:translateY(50%) scaleY(1) } }
/* opportunity tags beside each rung */
.anno{ position:absolute; left:164px; transform:translateY(50%); display:inline-flex; align-items:center; gap:8px; white-space:nowrap;
  font-weight:600; font-size:13.5px; color:var(--ink-3); background:#fff; border:1px solid var(--line); border-radius:999px; padding:8px 13px;
  box-shadow:0 1px 2px rgba(22,39,31,.05); transition:all .45s var(--ease-out); }
.anno::before{ content:""; position:absolute; left:-15px; top:50%; width:13px; height:2px; background:var(--mint-300); transform:translateY(-50%); }
.anno svg{ width:15px; height:15px; }
.anno.empty{ opacity:0; transform:translateY(50%) translateX(-8px); }
.anno.base{ color:var(--mint-ink); background:var(--mint-100); border-color:var(--mint-300); }
.anno.lit{ color:var(--mint-ink); background:var(--mint-100); border-color:var(--mint-300); }
.anno.goal{ font-weight:700; }
.anno.goal.lit{ background:linear-gradient(180deg,var(--gls-1),var(--gls-2)); border-color:var(--gls-edge); }
/* climber on the rungs */
.climber{ position:absolute; left:97px; width:40px; height:40px; transform:translate(-50%,42%); z-index:6; transition:bottom .55s var(--ease-out); pointer-events:none; }
.climber__av{ width:40px; height:40px; border-radius:50%; display:grid; place-items:center; color:#fff;
  background:radial-gradient(circle at 35% 28%, #c8f4de, var(--mint) 62%, var(--mint-deep));
  box-shadow:0 0 0 5px rgba(71,193,137,.16), 0 8px 16px -5px rgba(38,150,100,.5); animation:bob 2.4s var(--ease-soft) infinite; }
.climber__av svg{ width:22px; height:22px; }
@keyframes bob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-3px) } }

/* token tray */
.tray{ display:flex; flex-wrap:wrap; gap:9px; justify-content:center; max-width:330px; }
.tray__hint{ width:100%; text-align:center; font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); margin-bottom:2px; }
.tok{ display:inline-flex; align-items:center; gap:7px; cursor:grab; user-select:none; -webkit-user-select:none; touch-action:none;
  font-weight:600; font-size:13.5px; color:var(--mint-ink); background:var(--mint-100); border:1px solid var(--mint-300); border-radius:999px; padding:9px 14px;
  box-shadow:0 4px 12px -6px rgba(38,150,100,.4); transition:transform .2s var(--ease-out), opacity .3s ease, box-shadow .18s; }
.tok svg{ width:15px; height:15px; }
.tok:active{ cursor:grabbing; }
.tok.dragging{ box-shadow:0 16px 28px -10px rgba(38,150,100,.55); z-index:60; }
.tok.used{ opacity:0; transform:scale(.5); pointer-events:none; }
.ladderframe.hot .rail{ box-shadow:inset 0 0 0 1px rgba(71,193,137,.4), inset 2px 0 0 rgba(255,255,255,.14), 0 6px 14px -6px rgba(38,150,100,.45); }

.spark{ position:absolute; width:8px; height:8px; border-radius:50%; background:var(--mint); pointer-events:none; z-index:7; }

@media (max-width:820px){ .stage{ grid-template-columns:1fr; gap:28px; padding:34px 20px; } .cta__sub,.meter{ max-width:none; } .build{ overflow:hidden; } }
@media (prefers-reduced-motion: reduce){ .climber, .rung, .anno, .meter__fill{ transition:none; } .climber__av{ animation:none; } }
</style>
</head>
<body>
<div class="wrap">
  <p class="tag">Drag-to-build ladder · v2</p>
  <div class="stage">
    <div class="cta__copy">
      <h2 class="cta__title">Build your case, <em>rung by rung.</em></h2>
      <p class="cta__sub">Each opportunity is a rung. Drag them onto the ladder and climb — résumé at the bottom, green card at the top.</p>
      <div class="meter">
        <div class="meter__row"><span>Profile readiness</span><b id="pct">35%</b></div>
        <div class="meter__bar"><div class="meter__fill" id="fill"></div></div>
      </div>
      <div class="cta__actions">
        <span class="btn btn--primary" id="cta">Build my profile · free</span>
        <span class="btn btn--ghost">See how it works</span>
      </div>
    </div>

    <div class="build">
      <div class="ladderframe" id="ladder">
        <div class="rail l"></div><div class="rail r"></div>
        <!-- rungs (bottom → top) -->
        <div class="rung base"      data-i="0" style="bottom:6%"></div>
        <div class="rung dashed"    data-i="1" data-slot style="bottom:23.6%"></div>
        <div class="rung dashed"    data-i="2" data-slot style="bottom:41.2%"></div>
        <div class="rung dashed"    data-i="3" data-slot style="bottom:58.8%"></div>
        <div class="rung dashed"    data-i="4" data-slot style="bottom:76.4%"></div>
        <div class="rung dashed goal" data-i="5" style="bottom:94%"></div>
        <!-- opportunity tags -->
        <div class="anno base"  data-i="0" style="bottom:6%"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4"/></svg> Résumé</div>
        <div class="anno empty" data-i="1" style="bottom:23.6%"></div>
        <div class="anno empty" data-i="2" style="bottom:41.2%"></div>
        <div class="anno empty" data-i="3" style="bottom:58.8%"></div>
        <div class="anno empty" data-i="4" style="bottom:76.4%"></div>
        <div class="anno goal empty" data-i="5" style="bottom:94%"></div>
        <!-- climber -->
        <div class="climber" id="climber" style="bottom:6%"><div class="climber__av"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="7.2" r="3.4"/><path d="M5 20a7 7 0 0 1 14 0z"/></svg></div></div>
      </div>
      <div class="tray" id="tray"></div>
    </div>
  </div>
</div>

<script>
var OPPS = [
  { label: 'Peer review', icon: '<path d="M2.5 12S6 6 12 6s9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6z"/><circle cx="12" cy="12" r="2.4"/>' },
  { label: 'Speaking', icon: '<rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4"/>' },
  { label: 'Judging', icon: '<path d="M12 3v18M7 21h10M5 7h14"/><path d="M5 7 3 12a3 3 0 0 0 6 0L7 7M19 7l-2 5a3 3 0 0 0 6 0l-2-5"/>' },
  { label: 'Awards', icon: '<circle cx="12" cy="9" r="5"/><path d="m8.5 13-1 7 4.5-2.6L16.5 20l-1-7"/>' }
];
var GOAL = { label: 'Green card', icon: '<rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m8 12 2.5 2.5L16 9"/>' };
function svg(p) { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">' + p + '</svg>'; }
var LEVELS = [6, 23.6, 41.2, 58.8, 76.4, 94];
var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

var ladder = document.getElementById('ladder');
var tray = document.getElementById('tray');
var climber = document.getElementById('climber');
var fill = document.getElementById('fill');
var pct = document.getElementById('pct');
var cta = document.getElementById('cta');
var rungs = {}, annos = {};
ladder.querySelectorAll('.rung').forEach(function (r) { rungs[r.dataset.i] = r; });
ladder.querySelectorAll('.anno').forEach(function (a) { annos[a.dataset.i] = a; });
var oppRungIdx = [1, 2, 3, 4];
var placed = 0;
var TARGET = oppRungIdx.length;

function climbTo(level) { climber.style.bottom = LEVELS[level] + '%'; }
function nextRung() { return placed < TARGET ? oppRungIdx[placed] : null; }
function setTarget(on) {
  oppRungIdx.forEach(function (i) { rungs[i].classList.remove('is-target'); });
  if (on && nextRung() != null) rungs[nextRung()].classList.add('is-target');
}
function readiness() {
  var p = placed >= TARGET ? 100 : 35 + Math.round((placed / TARGET) * 63);
  pct.textContent = p + '%'; fill.style.width = p + '%';
}
function sparkle(level) {
  if (reduce) return;
  var lr = ladder.getBoundingClientRect();
  var cx = 97, cy = lr.height - (LEVELS[level] / 100 * lr.height);
  for (var i = 0; i < 9; i++) {
    var s = document.createElement('div'); s.className = 'spark'; s.style.left = cx + 'px'; s.style.top = cy + 'px';
    ladder.appendChild(s);
    var a = (i / 9) * Math.PI * 2, d = 24 + (i % 3) * 9;
    s.animate([{ transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
               { transform: 'translate(calc(-50% + ' + Math.cos(a) * d + 'px), calc(-50% + ' + Math.sin(a) * d + 'px)) scale(0)', opacity: 0 }],
              { duration: 620, easing: 'cubic-bezier(.22,1,.36,1)' }).onfinish = function () { this.effect.target.remove(); };
  }
}
function buildRung(idx, item, lit) {
  var r = rungs[idx]; r.classList.remove('dashed', 'is-target'); r.classList.add('built', 'pop');
  setTimeout(function () { r.classList.remove('pop'); }, 520);
  var a = annos[idx]; a.classList.remove('empty'); a.classList.add('lit');
  a.innerHTML = svg(item.icon) + '<span>' + item.label + '</span>';
  climbTo(idx); readiness(); sparkle(idx);
}
function placeOpportunity(opp) {
  var idx = nextRung(); if (idx == null) return false;
  placed++; buildRung(idx, opp, true);
  if (placed >= TARGET) finish(); else setTarget(true);
  return true;
}
function finish() {
  setTarget(false);
  setTimeout(function () { buildRung(5, GOAL, true); cta.classList.add('celebrate'); }, 520);
}

tray.innerHTML = '<span class="tray__hint">Drag onto the ladder ↑</span>';
OPPS.forEach(function (opp) {
  var t = document.createElement('span'); t.className = 'tok'; t.innerHTML = svg(opp.icon) + '<span>' + opp.label + '</span>'; t._opp = opp;
  tray.appendChild(t); makeDraggable(t);
});
function overLadder(x, y) { var r = ladder.getBoundingClientRect(); return x >= r.left - 40 && x <= r.right + 30 && y >= r.top - 12 && y <= r.bottom + 12; }
function makeDraggable(t) {
  var sx, sy, dragging = false;
  t.addEventListener('pointerdown', function (e) {
    if (t.classList.contains('used')) return;
    dragging = true; sx = e.clientX; sy = e.clientY;
    try { t.setPointerCapture(e.pointerId); } catch (x) {}
    t.classList.add('dragging'); setTarget(true); e.preventDefault();
  });
  t.addEventListener('pointermove', function (e) {
    if (!dragging) return;
    t.style.transform = 'translate(' + (e.clientX - sx) + 'px,' + (e.clientY - sy) + 'px) scale(1.05)';
    ladder.classList.toggle('hot', overLadder(e.clientX, e.clientY));
  });
  function end(e) {
    if (!dragging) return; dragging = false; t.classList.remove('dragging'); ladder.classList.remove('hot');
    try { t.releasePointerCapture(e.pointerId); } catch (x) {}
    if (overLadder(e.clientX, e.clientY) && nextRung() != null) { t.classList.add('used'); placeOpportunity(t._opp); }
    else { setTarget(false); t.style.transition = 'transform .35s var(--ease-out)'; t.style.transform = ''; setTimeout(function () { t.style.transition = ''; }, 360); }
  }
  t.addEventListener('pointerup', end); t.addEventListener('pointercancel', end);
}

function init() {
  readiness(); climbTo(0);
  if (reduce) { OPPS.forEach(function (o) { placeOpportunity(o); }); tray.querySelectorAll('.tok').forEach(function (t) { t.classList.add('used'); }); }
}
window.addEventListener('load', init);
</script>
</body>
</html>
